openapi: 3.1.0
info:
  title: Api
  version: 0.1.0
  description: Localfluence API - influencer marketplace
servers:
  - url: /api
    description: Base API path
tags:
  - name: health
  - name: auth
  - name: profiles
  - name: influencers
  - name: campaigns
  - name: requests
  - name: messages
  - name: dashboard

paths:
  /healthz:
    get:
      operationId: healthCheck
      tags: [health]
      responses:
        "200":
          description: Healthy
          content:
            application/json:
              schema: { $ref: "#/components/schemas/HealthStatus" }

  /auth/signup:
    post:
      operationId: signup
      tags: [auth]
      requestBody:
        required: true
        content:
          application/json:
            schema: { $ref: "#/components/schemas/SignupBody" }
      responses:
        "200":
          description: Signed up
          content:
            application/json:
              schema: { $ref: "#/components/schemas/AuthResponse" }

  /auth/login:
    post:
      operationId: login
      tags: [auth]
      requestBody:
        required: true
        content:
          application/json:
            schema: { $ref: "#/components/schemas/LoginBody" }
      responses:
        "200":
          description: Logged in
          content:
            application/json:
              schema: { $ref: "#/components/schemas/AuthResponse" }

  /auth/me:
    get:
      operationId: getCurrentUser
      tags: [auth]
      responses:
        "200":
          description: Current user
          content:
            application/json:
              schema: { $ref: "#/components/schemas/CurrentUser" }

  /auth/logout:
    post:
      operationId: logout
      tags: [auth]
      responses:
        "200":
          description: Logged out
          content:
            application/json:
              schema: { $ref: "#/components/schemas/OkResponse" }

  /profiles/me:
    get:
      operationId: getMyProfile
      tags: [profiles]
      responses:
        "200":
          description: My profile
          content:
            application/json:
              schema: { $ref: "#/components/schemas/Profile" }
    put:
      operationId: updateMyProfile
      tags: [profiles]
      requestBody:
        required: true
        content:
          application/json:
            schema: { $ref: "#/components/schemas/UpdateProfileBody" }
      responses:
        "200":
          description: Updated profile
          content:
            application/json:
              schema: { $ref: "#/components/schemas/Profile" }

  /influencers:
    get:
      operationId: listInfluencers
      tags: [influencers]
      parameters:
        - name: city
          in: query
          schema: { type: string }
        - name: area
          in: query
          schema: { type: string }
        - name: category
          in: query
          schema: { type: string }
        - name: minFollowers
          in: query
          schema: { type: integer }
        - name: maxFollowers
          in: query
          schema: { type: integer }
        - name: q
          in: query
          schema: { type: string }
      responses:
        "200":
          description: Influencer list
          content:
            application/json:
              schema:
                type: array
                items: { $ref: "#/components/schemas/InfluencerSummary" }

  /influencers/featured:
    get:
      operationId: listFeaturedInfluencers
      tags: [influencers]
      responses:
        "200":
          description: Featured influencers
          content:
            application/json:
              schema:
                type: array
                items: { $ref: "#/components/schemas/InfluencerSummary" }

  /influencers/categories:
    get:
      operationId: listInfluencerCategories
      tags: [influencers]
      responses:
        "200":
          description: Categories with counts
          content:
            application/json:
              schema:
                type: array
                items: { $ref: "#/components/schemas/CategoryCount" }

  /influencers/cities:
    get:
      operationId: listInfluencerCities
      tags: [influencers]
      responses:
        "200":
          description: Cities with counts
          content:
            application/json:
              schema:
                type: array
                items: { $ref: "#/components/schemas/CityCount" }

  /influencers/{id}:
    get:
      operationId: getInfluencer
      tags: [influencers]
      parameters:
        - name: id
          in: path
          required: true
          schema: { type: integer }
      responses:
        "200":
          description: Influencer detail
          content:
            application/json:
              schema: { $ref: "#/components/schemas/InfluencerDetail" }

  /campaigns:
    get:
      operationId: listMyCampaigns
      tags: [campaigns]
      responses:
        "200":
          description: Campaigns owned by current business
          content:
            application/json:
              schema:
                type: array
                items: { $ref: "#/components/schemas/Campaign" }
    post:
      operationId: createCampaign
      tags: [campaigns]
      requestBody:
        required: true
        content:
          application/json:
            schema: { $ref: "#/components/schemas/CreateCampaignBody" }
      responses:
        "200":
          description: Created campaign
          content:
            application/json:
              schema: { $ref: "#/components/schemas/Campaign" }

  /campaigns/{id}:
    get:
      operationId: getCampaign
      tags: [campaigns]
      parameters:
        - name: id
          in: path
          required: true
          schema: { type: integer }
      responses:
        "200":
          description: Campaign detail
          content:
            application/json:
              schema: { $ref: "#/components/schemas/Campaign" }

  /requests:
    get:
      operationId: listMyRequests
      tags: [requests]
      parameters:
        - name: status
          in: query
          schema:
            type: string
            enum: [pending, accepted, rejected, completed]
      responses:
        "200":
          description: Collaboration requests for current user
          content:
            application/json:
              schema:
                type: array
                items: { $ref: "#/components/schemas/CollaborationRequest" }
    post:
      operationId: createRequest
      tags: [requests]
      requestBody:
        required: true
        content:
          application/json:
            schema: { $ref: "#/components/schemas/CreateRequestBody" }
      responses:
        "200":
          description: Created request
          content:
            application/json:
              schema: { $ref: "#/components/schemas/CollaborationRequest" }

  /requests/{id}/status:
    put:
      operationId: updateRequestStatus
      tags: [requests]
      parameters:
        - name: id
          in: path
          required: true
          schema: { type: integer }
      requestBody:
        required: true
        content:
          application/json:
            schema: { $ref: "#/components/schemas/UpdateRequestStatusBody" }
      responses:
        "200":
          description: Updated request
          content:
            application/json:
              schema: { $ref: "#/components/schemas/CollaborationRequest" }

  /messages/conversations:
    get:
      operationId: listConversations
      tags: [messages]
      responses:
        "200":
          description: Conversations
          content:
            application/json:
              schema:
                type: array
                items: { $ref: "#/components/schemas/Conversation" }

  /messages/with/{userId}:
    get:
      operationId: listMessagesWithUser
      tags: [messages]
      parameters:
        - name: userId
          in: path
          required: true
          schema: { type: integer }
      responses:
        "200":
          description: Messages
          content:
            application/json:
              schema:
                type: array
                items: { $ref: "#/components/schemas/Message" }
    post:
      operationId: sendMessageToUser
      tags: [messages]
      parameters:
        - name: userId
          in: path
          required: true
          schema: { type: integer }
      requestBody:
        required: true
        content:
          application/json:
            schema: { $ref: "#/components/schemas/SendMessageBody" }
      responses:
        "200":
          description: Sent message
          content:
            application/json:
              schema: { $ref: "#/components/schemas/Message" }

  /dashboard/business:
    get:
      operationId: getBusinessDashboard
      tags: [dashboard]
      responses:
        "200":
          description: Business dashboard summary
          content:
            application/json:
              schema: { $ref: "#/components/schemas/BusinessDashboard" }

  /dashboard/influencer:
    get:
      operationId: getInfluencerDashboard
      tags: [dashboard]
      responses:
        "200":
          description: Influencer dashboard summary
          content:
            application/json:
              schema: { $ref: "#/components/schemas/InfluencerDashboard" }

components:
  schemas:
    HealthStatus:
      type: object
      required: [status]
      properties:
        status: { type: string }

    OkResponse:
      type: object
      required: [ok]
      properties:
        ok: { type: boolean }

    Role:
      type: string
      enum: [business, influencer]

    SignupBody:
      type: object
      required: [email, password, role, name]
      properties:
        email: { type: string }
        password: { type: string, minLength: 6 }
        role: { $ref: "#/components/schemas/Role" }
        name: { type: string }
        city: { type: string }

    LoginBody:
      type: object
      required: [email, password]
      properties:
        email: { type: string }
        password: { type: string }

    AuthResponse:
      type: object
      required: [token, user]
      properties:
        token: { type: string }
        user: { $ref: "#/components/schemas/CurrentUser" }

    CurrentUser:
      type: object
      required: [id, email, role]
      properties:
        id: { type: integer }
        email: { type: string }
        role: { $ref: "#/components/schemas/Role" }
        name: { type: string }
        avatarUrl: { type: string }

    Profile:
      type: object
      required: [userId, role]
      properties:
        userId: { type: integer }
        role: { $ref: "#/components/schemas/Role" }
        name: { type: string }
        bio: { type: string }
        city: { type: string }
        area: { type: string }
        category: { type: string }
        instagramUrl: { type: string }
        youtubeUrl: { type: string }
        followers: { type: integer }
        avatarUrl: { type: string }
        coverUrl: { type: string }
        companyName: { type: string }
        industry: { type: string }
        description: { type: string }

    UpdateProfileBody:
      type: object
      properties:
        name: { type: string }
        bio: { type: string }
        city: { type: string }
        area: { type: string }
        category: { type: string }
        instagramUrl: { type: string }
        youtubeUrl: { type: string }
        followers: { type: integer }
        avatarUrl: { type: string }
        coverUrl: { type: string }
        companyName: { type: string }
        industry: { type: string }
        description: { type: string }

    InfluencerSummary:
      type: object
      required: [id, name, city, category, followers]
      properties:
        id: { type: integer }
        name: { type: string }
        city: { type: string }
        area: { type: string }
        category: { type: string }
        followers: { type: integer }
        avatarUrl: { type: string }
        bio: { type: string }

    InfluencerDetail:
      allOf:
        - $ref: "#/components/schemas/InfluencerSummary"
        - type: object
          properties:
            instagramUrl: { type: string }
            youtubeUrl: { type: string }
            coverUrl: { type: string }

    CategoryCount:
      type: object
      required: [category, count]
      properties:
        category: { type: string }
        count: { type: integer }

    CityCount:
      type: object
      required: [city, count]
      properties:
        city: { type: string }
        count: { type: integer }

    Campaign:
      type: object
      required: [id, businessId, title, description, budget, location, deliverables, createdAt]
      properties:
        id: { type: integer }
        businessId: { type: integer }
        businessName: { type: string }
        title: { type: string }
        description: { type: string }
        budget: { type: integer }
        location: { type: string }
        deliverables: { type: string }
        createdAt: { type: string, format: date-time }

    CreateCampaignBody:
      type: object
      required: [title, description, budget, location, deliverables]
      properties:
        title: { type: string }
        description: { type: string }
        budget: { type: integer }
        location: { type: string }
        deliverables: { type: string }

    RequestStatus:
      type: string
      enum: [pending, accepted, rejected, completed]

    CollaborationRequest:
      type: object
      required: [id, businessId, influencerId, status, createdAt]
      properties:
        id: { type: integer }
        businessId: { type: integer }
        businessName: { type: string }
        influencerId: { type: integer }
        influencerName: { type: string }
        campaignId: { type: integer }
        campaignTitle: { type: string }
        message: { type: string }
        status: { $ref: "#/components/schemas/RequestStatus" }
        createdAt: { type: string, format: date-time }

    CreateRequestBody:
      type: object
      required: [influencerId]
      properties:
        influencerId: { type: integer }
        campaignId: { type: integer }
        message: { type: string }

    UpdateRequestStatusBody:
      type: object
      required: [status]
      properties:
        status: { $ref: "#/components/schemas/RequestStatus" }

    Message:
      type: object
      required: [id, senderId, receiverId, content, createdAt]
      properties:
        id: { type: integer }
        senderId: { type: integer }
        receiverId: { type: integer }
        content: { type: string }
        createdAt: { type: string, format: date-time }

    SendMessageBody:
      type: object
      required: [content]
      properties:
        content: { type: string, minLength: 1 }

    Conversation:
      type: object
      required: [otherUserId, otherUserName, lastMessage, lastMessageAt, unreadCount]
      properties:
        otherUserId: { type: integer }
        otherUserName: { type: string }
        otherUserRole: { $ref: "#/components/schemas/Role" }
        otherUserAvatarUrl: { type: string }
        lastMessage: { type: string }
        lastMessageAt: { type: string, format: date-time }
        unreadCount: { type: integer }

    BusinessDashboard:
      type: object
      required: [campaignCount, requestsSent, activeCollaborations, recentRequests, recentCampaigns]
      properties:
        campaignCount: { type: integer }
        requestsSent: { type: integer }
        activeCollaborations: { type: integer }
        pendingRequests: { type: integer }
        recentRequests:
          type: array
          items: { $ref: "#/components/schemas/CollaborationRequest" }
        recentCampaigns:
          type: array
          items: { $ref: "#/components/schemas/Campaign" }

    InfluencerDashboard:
      type: object
      required: [pendingRequests, acceptedCollaborations, totalRequests, recentRequests]
      properties:
        pendingRequests: { type: integer }
        acceptedCollaborations: { type: integer }
        totalRequests: { type: integer }
        recentRequests:
          type: array
          items: { $ref: "#/components/schemas/CollaborationRequest" }
